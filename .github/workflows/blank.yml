name: PDF OCR and Release

on:
  push:
    paths:
      - '**/*.pdf' # Triggers automatically when a PDF is pushed
  workflow_dispatch: # Allows you to run it manually from the Actions tab

jobs:
  ocr-process:
    runs-on: ubuntu-latest
    permissions:
      contents: write # Required to create a GitHub Release

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Install System Dependencies (Tesseract & Poppler)
        # Installs Tesseract, Poppler (for PDF to image conversion), and language packs
        run: |
          sudo apt-get update
          sudo apt-get install -y poppler-utils tesseract-ocr tesseract-ocr-eng tesseract-ocr-fas tesseract-ocr-ara

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install Python Dependencies
        run: pip install pdf2image pytesseract

      - name: Run OCR Script
        # Inline Python script to find PDFs, convert to images, OCR with mixed languages, and format output
        run: |
          python -c "
          import os
          import glob
          from pdf2image import convert_from_path
          import pytesseract

          # Find all PDFs in the repository
          pdf_files = glob.glob('**/*.pdf', recursive=True)
          
          if not pdf_files:
              print('No PDF files found.')
              exit(0)

          for pdf in pdf_files:
              print(f'Processing: {pdf}')
              base_name = os.path.splitext(os.path.basename(pdf))[0]
              txt_filename = f'{base_name}_ocr_result.txt'
              
              # Convert PDF pages to images
              pages = convert_from_path(pdf)
              
              with open(txt_filename, 'w', encoding='utf-8') as f:
                  for i, page in enumerate(pages):
                      print(f'  OCR on page {i + 1}...')
                      # OCR combining Persian, Arabic, and English
                      text = pytesseract.image_to_string(page, lang='fas+ara+eng')
                      
                      # Write the template format: Page Number then Contents
                      f.write(f'Page {i + 1}\n')
                      f.write(text)
                      f.write('\n\n')
              
              print(f'Finished processing {pdf}. Saved to {txt_filename}')
          "

      - name: Create GitHub Release and Upload TXT files
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ocr-run-${{ github.run_id }}
          name: "OCR Results: Run ${{ github.run_id }}"
          body: "Automated OCR extraction for newly added or updated PDFs."
          files: '*_ocr_result.txt'
          draft: false
          prerelease: false
