name: Advanced PDF OCR (EasyOCR)

on:
  push:
    paths:
      - '**/*.pdf'
  workflow_dispatch:

jobs:
  ocr-process:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Install System Dependencies (Poppler)
        # Poppler is still required to convert PDFs to images
        run: |
          sudo apt-get update
          sudo apt-get install -y poppler-utils

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install Python Dependencies
        # Installing CPU version of PyTorch to save time/space on GitHub Runners, plus EasyOCR
        run: |
          pip install torch torchvision --index-url https://download.pytorch.org/whl/cpu
          pip install pdf2image easyocr opencv-python-headless numpy

      - name: Run Advanced OCR Script
        run: |
          python -c "
          import os
          import glob
          import numpy as np
          import easyocr
          from pdf2image import convert_from_path

          pdf_files = glob.glob('**/*.pdf', recursive=True)
          if not pdf_files:
              print('No PDF files found.')
              exit(0)

          # Initialize the EasyOCR reader with Persian, Arabic, and English
          # gpu=False because standard GitHub Action runners do not have GPUs
          print('Downloading OCR models (this happens once per run)...')
          reader = easyocr.Reader(['fa', 'ar', 'en'], gpu=False)

          for pdf in pdf_files:
              print(f'Processing: {pdf}')
              base_name = os.path.splitext(os.path.basename(pdf))[0]
              txt_filename = f'{base_name}_ocr_result.txt'
              
              pages = convert_from_path(pdf)
              
              with open(txt_filename, 'w', encoding='utf-8') as f:
                  for i, page in enumerate(pages):
                      print(f'  OCR on page {i + 1}...')
                      
                      # EasyOCR requires numpy arrays instead of raw PIL images
                      img_array = np.array(page)
                      
                      # paragraph=True forces the AI to group mixed text lines logically
                      results = reader.readtext(img_array, paragraph=True)
                      
                      # Extract just the text from the result list
                      extracted_text = '\n'.join([res[1] for res in results])
                      
                      f.write(f'Page {i + 1}\n')
                      f.write(extracted_text)
                      f.write('\n\n')
              
              print(f'Finished processing {pdf}. Saved to {txt_filename}')
          "

      - name: Create GitHub Release and Upload TXT files
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ocr-run-${{ github.run_id }}
          name: "EasyOCR Results: Run ${{ github.run_id }}"
          body: "Advanced ML-based OCR extraction for PDFs."
          files: '*_ocr_result.txt'
          draft: false
          prerelease: false
